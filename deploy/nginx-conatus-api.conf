# conatus-api.rectorspace.com — Cloudflare-proxied (Origin CA, SSL Full-strict)
server {
  listen 443 ssl;
  server_name conatus-api.rectorspace.com;

  ssl_certificate     /etc/ssl/cloudflare/conatus-api.rectorspace.com.pem;
  ssl_certificate_key /etc/ssl/cloudflare/conatus-api.rectorspace.com.key;

  client_max_body_size 1m;

  location / {
    proxy_pass http://127.0.0.1:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
  }
}
