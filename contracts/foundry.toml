[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
# Mantle is EVM-equivalent. "paris" is the safest floor (no PUSH0 dependency);
# bump to "shanghai"/"cancun" only if confirmed supported and needed.
evm_version = "paris"

[rpc_endpoints]
mantle_sepolia = "${MANTLE_RPC_URL}"
mantle = "${MANTLE_MAINNET_RPC_URL}"

[etherscan]
mantle_sepolia = { key = "${MANTLESCAN_API_KEY}", url = "https://api-sepolia.mantlescan.xyz/api", chain = 5003 }
mantle = { key = "${MANTLESCAN_API_KEY}", url = "https://api.mantlescan.xyz/api", chain = 5000 }
