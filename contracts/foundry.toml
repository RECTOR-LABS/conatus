[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
# Mantle is EVM-equivalent. "paris" is the safest floor (no PUSH0 dependency);
# bump to "shanghai"/"cancun" only if confirmed supported and needed.
evm_version = "paris"

[rpc_endpoints]
mantle_sepolia = "${MANTLE_RPC_URL}"
mantle = "${MANTLE_MAINNET_RPC_URL}"

[etherscan]
# Etherscan API V2 (unified multichain). The legacy per-explorer V1 endpoints
# (api*.mantlescan.xyz/api) were deprecated; one Etherscan key now serves all chains.
# The chainid must be in the URL — forge does not auto-append it to an explicit verifier URL.
mantle_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=5003", chain = 5003 }
mantle = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=5000", chain = 5000 }
