<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      .d { font-family: 'Archivo', sans-serif; }
      .m { font-family: 'JetBrains Mono', monospace; }
    </style>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.12"/>
      <stop offset="55%" stop-color="#5eead4" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#5eead4" stroke-width="1.6"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1600" height="900" fill="#0a0e0d"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <ellipse cx="800" cy="-40" rx="760" ry="340" fill="url(#glow)"/>

  <!-- corner registration ticks -->
  <g stroke="#5eead4" stroke-opacity="0.55" stroke-width="1.5" fill="none">
    <path d="M40 58 V40 H58"/>
    <path d="M1560 58 V40 H1542"/>
    <path d="M40 842 V860 H58"/>
    <path d="M1560 842 V860 H1542"/>
  </g>

  <!-- header -->
  <circle cx="86" cy="112" r="5" fill="#5eead4"/>
  <text x="104" y="118" class="m" font-size="19" letter-spacing="5" fill="#5eead4" fill-opacity="0.9">LIVE ON MANTLE MAINNET · ERC-8004 AGENT #115</text>
  <text x="78" y="214" class="d" font-size="98" font-weight="800" letter-spacing="-2" fill="#f3f5f4">CONATUS<tspan fill="#5eead4">_</tspan></text>
  <text x="80" y="268" class="d" font-size="33" font-weight="600" fill="#cfd8d4">The smart-contract audit that lives on-chain.</text>
  <text x="80" y="312" class="d" font-size="25" font-weight="600" fill="#94a39d">Tools give you a <tspan fill="#f3f5f4">report</tspan>. Conatus gives you a <tspan fill="#5eead4" font-weight="700">record</tspan>.</text>

  <!-- pipeline -->
  <g>
    <!-- arrows under boxes -->
    <line x1="388" y1="475" x2="455" y2="475" stroke="#5eead4" stroke-width="1.6" marker-end="url(#arrow)"/>
    <line x1="771" y1="475" x2="838" y2="475" stroke="#5eead4" stroke-width="1.6" marker-end="url(#arrow)"/>
    <line x1="1154" y1="475" x2="1221" y2="475" stroke="#5eead4" stroke-width="1.6" marker-end="url(#arrow)"/>

    <!-- box 1 -->
    <rect x="80" y="390" width="290" height="170" rx="12" fill="#0f1413" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="104" y="432" class="m" font-size="14" letter-spacing="3" fill="#5eead4" fill-opacity="0.8">01 / INPUT</text>
    <text x="104" y="482" class="d" font-size="31" font-weight="800" fill="#f3f5f4">CONTRACT</text>
    <text x="104" y="520" class="m" font-size="15" fill="#94a39d">single-file Solidity</text>

    <!-- box 2 -->
    <rect x="463" y="390" width="290" height="170" rx="12" fill="#0f1413" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="487" y="432" class="m" font-size="14" letter-spacing="3" fill="#5eead4" fill-opacity="0.8">02 / ANALYZE</text>
    <text x="487" y="482" class="d" font-size="31" font-weight="800" fill="#f3f5f4">SLITHER × AI</text>
    <text x="487" y="520" class="m" font-size="15" fill="#94a39d">static · gas · LLM synthesis</text>

    <!-- box 3 -->
    <rect x="846" y="390" width="290" height="170" rx="12" fill="#0f1413" stroke="#5eead4" stroke-opacity="0.35"/>
    <text x="870" y="432" class="m" font-size="14" letter-spacing="3" fill="#5eead4" fill-opacity="0.8">03 / ANCHOR</text>
    <text x="870" y="482" class="d" font-size="31" font-weight="800" fill="#f3f5f4">ON-CHAIN</text>
    <text x="870" y="520" class="m" font-size="15" fill="#94a39d">AuditAttestation · #115</text>

    <!-- box 4 -->
    <rect x="1229" y="390" width="290" height="170" rx="12" fill="#0f1413" stroke="#5eead4" stroke-opacity="0.35"/>
    <text x="1253" y="432" class="m" font-size="14" letter-spacing="3" fill="#5eead4" fill-opacity="0.8">04 / REPUTATION</text>
    <text x="1253" y="482" class="d" font-size="31" font-weight="800" fill="#5eead4">RATED</text>
    <text x="1253" y="520" class="m" font-size="15" fill="#94a39d">90 · 85 · 88 · third-party</text>
  </g>

  <!-- reputation loop arrow (4 -> 3) -->
  <path d="M1374 560 C1374 645, 991 645, 991 568" fill="none" stroke="#5eead4" stroke-opacity="0.6" stroke-width="1.5" stroke-dasharray="5 5" marker-end="url(#arrow)"/>
  <text x="1182" y="662" class="m" font-size="14" fill="#5eead4" fill-opacity="0.75" text-anchor="middle">every verdict accrues reputation · the agent can't rate itself</text>

  <!-- facts strip -->
  <line x1="80" y1="724" x2="1520" y2="724" stroke="#ffffff" stroke-opacity="0.1"/>
  <g class="m" font-size="16" fill="#cfd8d4">
    <text x="80" y="766">every verdict <tspan fill="#5eead4">recomputable</tspan> from the pinned report</text>
    <text x="690" y="766">·</text>
    <text x="712" y="766">same address, <tspan fill="#5eead4">both chains</tspan></text>
    <text x="1060" y="766">·</text>
    <text x="1082" y="766">paid in <tspan fill="#5eead4">real MNT</tspan>, not testnet</text>
  </g>

  <!-- footer -->
  <text x="80" y="836" class="m" font-size="16" letter-spacing="2" fill="#7e8c86">conatus.rectorspace.com</text>
  <text x="800" y="836" class="m" font-size="16" letter-spacing="2" fill="#7e8c86" text-anchor="middle">github.com/RECTOR-LABS/conatus</text>
  <text x="1520" y="836" class="m" font-size="16" letter-spacing="2" fill="#5eead4" fill-opacity="0.8" text-anchor="end">#MantleAIHackathon</text>
</svg>
